services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
      POSTGRES_DB: parking
    ports:
      - "5433:5432"          # 5433 on host to avoid conflicts with local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking"]
      interval: 2s
      timeout: 3s
      retries: 10

  pricing:
    build: .
    ports:
      - "50052:50052"
    environment:
      DATABASE_URL: postgresql://parking:parking@db:5432/parking
      GRPC_PORT: "50052"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s = socket.create_connection(('localhost', 50052), timeout=2); s.close()\""]
      interval: 3s
      timeout: 5s
      retries: 10
